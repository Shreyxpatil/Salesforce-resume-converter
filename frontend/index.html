<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Converter AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .drag-active { border-color: #3b82f6; background-color: #eff6ff; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Slider Animation Classes */
        .slider-single { transform: translateX(0); }
        .slider-batch { transform: translateX(100%); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">

    <div class="max-w-3xl mx-auto py-10 px-4">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900">Resume Converter</h1>
            <p class="text-gray-500 text-sm mt-1">AI-Powered Parsing & Formatting</p>
        </div>

        <div class="bg-gray-200 rounded-full p-1 relative flex items-center cursor-pointer mb-8 h-14 shadow-inner max-w-md mx-auto">
            <div id="sliderBg" class="absolute left-1 top-1 bottom-1 w-[calc(50%-4px)] bg-white rounded-full shadow-md transition-all duration-300 ease-in-out z-0"></div>

            <button onclick="switchTab('single')" id="btnSingle" class="w-1/2 z-10 text-center font-bold text-gray-900 transition-colors duration-300 focus:outline-none">
                <i class="fas fa-file mr-2"></i> Single File
            </button>

            <button onclick="switchTab('batch')" id="btnBatch" class="w-1/2 z-10 text-center font-medium text-gray-500 transition-colors duration-300 focus:outline-none">
                <i class="fas fa-layer-group mr-2"></i> Batch Process
            </button>
        </div>

        <div id="singleFormContainer" class="bg-white rounded-2xl shadow-xl p-8 fade-in">
            <form id="singleForm" class="space-y-6">
                
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">1. Choose Template</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="cursor-pointer">
                            <input type="radio" name="singleTemplate" value="classic" class="peer sr-only" checked>
                            <div class="p-3 rounded-lg border-2 border-gray-200 peer-checked:border-blue-500 peer-checked:bg-blue-50 hover:bg-gray-50 transition-all text-center">
                                <div class="text-blue-600 mb-1"><i class="fas fa-file-word text-xl"></i></div>
                                <span class="text-sm font-bold">General</span>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="singleTemplate" value="salesforce" class="peer sr-only">
                            <div class="p-3 rounded-lg border-2 border-gray-200 peer-checked:border-orange-500 peer-checked:bg-orange-50 hover:bg-gray-50 transition-all text-center">
                                <div class="text-orange-500 mb-1"><i class="fab fa-salesforce text-xl"></i></div>
                                <span class="text-sm font-bold">Salesforce</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">2. Upload One File</label>
                    <div id="dropZoneSingle" class="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:border-blue-400 hover:bg-gray-50 transition-colors cursor-pointer">
                        <input type="file" id="fileInputSingle" class="hidden" accept=".pdf,.docx">
                        <i class="fas fa-cloud-upload-alt text-2xl text-gray-400 mb-2"></i>
                        <p class="text-sm text-gray-600" id="fileNameSingle">Click to upload PDF or DOCX</p>
                    </div>
                </div>

                <button type="submit" id="btnConvertSingle" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg transition-transform transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    Convert Now
                </button>
            </form>

            <div id="resultSingle" class="hidden mt-6 text-center bg-green-50 p-4 rounded-xl border border-green-200">
                <p class="text-green-800 font-bold mb-3"><i class="fas fa-check-circle"></i> Ready!</p>
                <a id="linkSingle" href="#" class="inline-block bg-green-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-green-700 shadow transition-colors">
                    Download DOCX
                </a>
            </div>
        </div>

        <div id="batchFormContainer" class="hidden bg-white rounded-2xl shadow-xl p-8">
            <form id="batchForm" class="space-y-6">
                
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">1. Choose Template for Batch</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="cursor-pointer">
                            <input type="radio" name="batchTemplate" value="classic" class="peer sr-only" checked>
                            <div class="p-3 rounded-lg border-2 border-gray-200 peer-checked:border-purple-500 peer-checked:bg-purple-50 hover:bg-gray-50 transition-all text-center">
                                <div class="text-purple-600 mb-1"><i class="fas fa-file-word text-xl"></i></div>
                                <span class="text-sm font-bold">General</span>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="batchTemplate" value="salesforce" class="peer sr-only">
                            <div class="p-3 rounded-lg border-2 border-gray-200 peer-checked:border-orange-500 peer-checked:bg-orange-50 hover:bg-gray-50 transition-all text-center">
                                <div class="text-orange-500 mb-1"><i class="fab fa-salesforce text-xl"></i></div>
                                <span class="text-sm font-bold">Salesforce</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">2. Upload Multiple Files</label>
                    <div id="dropZoneBatch" class="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:border-purple-400 hover:bg-gray-50 transition-colors cursor-pointer">
                        <input type="file" id="fileInputBatch" class="hidden" accept=".pdf,.docx" multiple>
                        <i class="fas fa-layer-group text-2xl text-gray-400 mb-2"></i>
                        <p class="text-sm text-gray-600" id="fileNameBatch">Click to upload multiple files</p>
                    </div>
                    <div id="batchFileList" class="hidden mt-2 text-xs text-gray-500 bg-gray-50 p-2 rounded"></div>
                </div>

                <button type="submit" id="btnConvertBatch" class="w-full py-3 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-xl shadow-lg transition-transform transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    Convert Batch (ZIP)
                </button>
            </form>

            <div id="resultBatch" class="hidden mt-6 text-center bg-purple-50 p-4 rounded-xl border border-purple-200">
                <p class="text-purple-800 font-bold mb-3"><i class="fas fa-check-circle"></i> Batch Complete!</p>
                <a id="linkBatch" href="#" class="inline-block bg-purple-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-purple-700 shadow transition-colors">
                    Download ZIP
                </a>
                <div id="batchErrors" class="hidden mt-2 text-left text-xs text-red-600"></div>
            </div>
        </div>

        <div id="progressOverlay" class="hidden fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center z-50">
            <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full text-center">
                <div class="mb-4">
                    <i class="fas fa-circle-notch fa-spin text-3xl text-blue-600"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-800 mb-1">Processing...</h3>
                <p id="progressText" class="text-sm text-gray-500 mb-4">Initializing AI...</p>
                <div class="w-full bg-gray-200 rounded-full h-2.5 dark:bg-gray-700">
                    <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- TABS LOGIC ---
        const sliderBg = document.getElementById('sliderBg');
        const btnSingle = document.getElementById('btnSingle');
        const btnBatch = document.getElementById('btnBatch');
        const singleFormContainer = document.getElementById('singleFormContainer');
        const batchFormContainer = document.getElementById('batchFormContainer');

        function switchTab(mode) {
            if (mode === 'single') {
                sliderBg.classList.remove('translate-x-full');
                
                btnSingle.classList.add('text-gray-900', 'font-bold');
                btnSingle.classList.remove('text-gray-500', 'font-medium');
                
                btnBatch.classList.remove('text-gray-900', 'font-bold');
                btnBatch.classList.add('text-gray-500', 'font-medium');

                singleFormContainer.classList.remove('hidden');
                batchFormContainer.classList.add('hidden');
                singleFormContainer.classList.add('fade-in');
            } else {
                sliderBg.classList.add('translate-x-full'); // Slides to the right
                
                btnBatch.classList.add('text-gray-900', 'font-bold');
                btnBatch.classList.remove('text-gray-500', 'font-medium');
                
                btnSingle.classList.remove('text-gray-900', 'font-bold');
                btnSingle.classList.add('text-gray-500', 'font-medium');

                batchFormContainer.classList.remove('hidden');
                singleFormContainer.classList.add('hidden');
                batchFormContainer.classList.add('fade-in');
            }
        }

        // --- FILE UPLOAD LOGIC ---
        // Single
        const dropZoneSingle = document.getElementById('dropZoneSingle');
        const fileInputSingle = document.getElementById('fileInputSingle');
        dropZoneSingle.onclick = () => fileInputSingle.click();
        fileInputSingle.onchange = () => {
            if (fileInputSingle.files[0]) {
                document.getElementById('fileNameSingle').innerText = fileInputSingle.files[0].name;
                document.getElementById('fileNameSingle').classList.add('text-blue-600', 'font-bold');
            }
        };

        // Batch
        const dropZoneBatch = document.getElementById('dropZoneBatch');
        const fileInputBatch = document.getElementById('fileInputBatch');
        const batchFileList = document.getElementById('batchFileList');
        dropZoneBatch.onclick = () => fileInputBatch.click();
        fileInputBatch.onchange = () => {
            if (fileInputBatch.files.length > 0) {
                document.getElementById('fileNameBatch').innerText = `${fileInputBatch.files.length} files selected`;
                document.getElementById('fileNameBatch').classList.add('text-purple-600', 'font-bold');
                
                // Show list
                batchFileList.classList.remove('hidden');
                batchFileList.innerHTML = Array.from(fileInputBatch.files).map(f => `<div>• ${f.name}</div>`).join('');
            }
        };

        // --- SUBMIT LOGIC ---
        const progressOverlay = document.getElementById('progressOverlay');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        // SINGLE SUBMIT
        document.getElementById('singleForm').onsubmit = async (e) => {
            e.preventDefault();
            if (!fileInputSingle.files[0]) return alert("Select a file!");
            
            startProcess();
            
            const formData = new FormData();
            formData.append("resume_file", fileInputSingle.files[0]);
            formData.append("template_choice", document.querySelector('input[name="singleTemplate"]:checked').value);

            try {
                const res = await fetch("/api/convert-resume", { method: "POST", body: formData });
                const data = await res.json();
                pollStatus(data.job_id, 'single');
            } catch (err) {
                endProcess(err.message);
            }
        };

        // BATCH SUBMIT
        document.getElementById('batchForm').onsubmit = async (e) => {
            e.preventDefault();
            if (fileInputBatch.files.length === 0) return alert("Select files!");

            startProcess();

            const formData = new FormData();
            Array.from(fileInputBatch.files).forEach(f => formData.append("resume_files", f));
            formData.append("template_choice", document.querySelector('input[name="batchTemplate"]:checked').value);

            try {
                const res = await fetch("/api/convert-resumes-batch", { method: "POST", body: formData });
                const data = await res.json();
                pollStatus(data.job_id, 'batch');
            } catch (err) {
                endProcess(err.message);
            }
        };

        // --- POLLING & UI HELPERS ---
        function startProcess() {
            progressOverlay.classList.remove('hidden');
            progressBar.style.width = '0%';
            progressText.innerText = 'Starting...';
            // Hide previous results
            document.getElementById('resultSingle').classList.add('hidden');
            document.getElementById('resultBatch').classList.add('hidden');
        }

        function endProcess(errorMsg = null) {
            progressOverlay.classList.add('hidden');
            if (errorMsg) alert("Error: " + errorMsg);
        }

        async function pollStatus(jobId, mode) {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`/api/job-status/${jobId}`);
                    const data = await res.json();

                    progressText.innerText = data.progress;

                    // Calculate Percentage
                    let percent = 10;
                    if (data.total_files && data.total_files > 0) {
                        const done = (data.completed_files || 0) + (data.failed_files || 0);
                        percent = Math.round((done / data.total_files) * 100);
                    } else if (data.status === 'processing') {
                        percent = 50; // Fake it for single file
                    }
                    progressBar.style.width = `${percent}%`;

                    if (data.status === 'completed') {
                        clearInterval(interval);
                        endProcess();
                        showResult(mode, data.result.download_url, data.result.failed_details);
                    } else if (data.status === 'error') {
                        clearInterval(interval);
                        endProcess(data.error);
                    }
                } catch (e) {
                    clearInterval(interval);
                    endProcess("Connection lost");
                }
            }, 1000);
        }

        function showResult(mode, url, errors) {
            if (mode === 'single') {
                const resDiv = document.getElementById('resultSingle');
                const link = document.getElementById('linkSingle');
                resDiv.classList.remove('hidden');
                link.href = url;
            } else {
                const resDiv = document.getElementById('resultBatch');
                const link = document.getElementById('linkBatch');
                const errDiv = document.getElementById('batchErrors');
                
                resDiv.classList.remove('hidden');
                link.href = url;

                if (errors && errors.length > 0) {
                    errDiv.classList.remove('hidden');
                    errDiv.innerText = `Failed: ${errors.map(e => e.name).join(', ')}`;
                } else {
                    errDiv.classList.add('hidden');
                }
            }
        }
    </script>
</body>
</html>
